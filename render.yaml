services:
  - type: web
    name: whale-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whale-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: TRANSACTION_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_BOT_TOKEN
        sync: false
      - key: BOT_NAME
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: whale-postgres
    databaseName: whale
    plan: free
    ipAllowList: [] 