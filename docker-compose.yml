version: '3.8'
services:
  postgres:
    mem_limit: 1GB
    image: postgres:16
    container_name: whale-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    mem_limit: 1GB
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: whale-backend
    ports:
      - "3000:3000"
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/whale?schema=public
      - JWT_SECRET=your-secret-key-here
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install && npx prisma generate && nodemon --legacy-watch --watch src --ext ts,json --exec 'npm run start:dev'"

  bot:
    mem_limit: 1GB
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: whale-bot
    environment:
      - TELEGRAM_BOT_TOKEN=7738656789:AAFKiGGh_UFLg29NIIBFs7G5PRpbrMpdu7k
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start:bot"

volumes:
  postgres_data: